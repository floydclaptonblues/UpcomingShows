<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Upcoming Shows | Balcony Music Club</title>
  <meta name="description" content="Upcoming shows at Balcony Music Club in New Orleans.">
  <meta name="theme-color" content="#050613">
  <link rel="stylesheet" href="./styles.css?v=20260614-assets">
  <link rel="stylesheet" href="./puzzle-background.css?v=20260614-puzzle">
</head>
<body>
  <main class="bmc-shell">
    <div class="bmc-mosaic" id="bmcMosaic" aria-hidden="true"></div>

    <div class="bmc-frame">
      <header class="bmc-hero">
        <div class="bmc-star" aria-hidden="true">✦</div>
        <h1 class="bmc-title">Upcoming Shows</h1>
        <p class="bmc-subtitle">June 2026 • Balcony Music Club</p>
      </header>

      <div class="bmc-toolbar" aria-label="Schedule summary">
        <div class="bmc-count" id="bmc-count">Loading schedule…</div>
        <div class="bmc-note">Mobile-first agenda • scrolls with the page, not inside a box</div>
      </div>

      <section class="bmc-calendar" id="bmc-calendar" aria-label="Upcoming shows"></section>
    </div>
  </main>

  <script type="application/json" id="shows-data">{"shows":[]}</script>
  <script src="./script.js?v=20260614-assets" defer></script>
  <script src="./puzzle-background.js?v=20260614-puzzle" defer></script>
</body>
</html>
