<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Upcoming Shows | Balcony Music Club</title>
  <meta name="description" content="Upcoming shows at Balcony Music Club in New Orleans.">
  <meta name="theme-color" content="#050613">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=20260614-assets">
  <link rel="stylesheet" href="./site-nav.css?v=20260615-bright-socials">
  <link rel="stylesheet" href="./bmc-top-media.css?v=20260616-hide-video-signal">
  <link rel="stylesheet" href="./puzzle-background.css?v=20260614-full-collage-cart">
</head>
<body>
  <main class="bmc-shell">
    <div class="bmc-mosaic" id="bmcMosaic" aria-hidden="true"></div>

    <header class="site-header" aria-label="Balcony Music Club site header">
      <a class="brand" href="https://www.balconymusicclub.com/" aria-label="Balcony Music Club home">
        <img src="https://floydclaptonblues.github.io/BMC-Homepage/bmc_homepage_build/assets/bmc-logo-pixel.png?v=logo-revert-jazzycat-room-20260615" alt="Balcony Music Club">
      </a>

      <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">☰</button>

      <nav class="main-nav" aria-label="Primary navigation">
        <a href="https://www.balconymusicclub.com/">Home</a>
        <a href="https://shows.balconymusicclub.com/" class="active" aria-current="page">Shows</a>
        <a href="https://www.balconymusicclub.com/host-your-event">Host Your Event</a>
        <a href="https://www.balconymusicclub.com/store">Store</a>
        <a href="https://www.balconymusicclub.com/ask-jazzycat">Ask JazzyCat</a>
      </nav>

      <div class="header-actions header-socials" aria-label="Balcony Music Club social links">
        <a class="social-btn" href="https://www.instagram.com/balconymusicclub_504" target="_blank" rel="noopener noreferrer" aria-label="Instagram" title="Instagram">IG</a>
        <a class="social-btn" href="https://youtube.com/@officialbmcneworleans504?si=xQkUAVLCyHDpRHFb" target="_blank" rel="noopener noreferrer" aria-label="YouTube" title="YouTube">YT</a>
        <a class="social-btn" href="https://www.facebook.com/share/1TirbYYtqN/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer" aria-label="Facebook" title="Facebook">FB</a>
        <a class="social-btn social-btn--app" href="https://app.balconymusicclub.com/" target="_blank" rel="noopener noreferrer" aria-label="BMC App" title="BMC App">APP</a>
      </div>
    </header>

    <div class="bmc-frame">
      <header class="bmc-hero">
        <div class="bmc-star" aria-hidden="true">✦</div>
        <h1 class="bmc-title">Upcoming Shows</h1>
        <p class="bmc-subtitle">June 2026 • Balcony Music Club</p>
      </header>

      <section class="bmc-calendar" id="bmc-calendar" aria-label="Upcoming shows"></section>

      <section class="bmc-top-media bmc-bottom-media" aria-label="Balcony Music Club radio">
        <section class="bmc-radio-mini" id="bmcRadioMini" aria-label="Balcony Music Club radio player">
          <div class="bmc-radio-mini__label">BMC Radio</div>
          <div class="bmc-radio-mini__track">
            <span id="bmcRadioTitle">Windows 95 Startup → Ghost Parade On Canal</span>
            <span class="bmc-radio-mini__sub">Balcony Signal</span>
          </div>
          <button id="bmcRadioPlay" type="button">▶ Play</button>
          <button id="bmcRadioNext" type="button">Next</button>
          <div class="bmc-radio-mini__meter" aria-hidden="true"><span id="bmcRadioProgress"></span></div>
          <div class="bmc-radio-mini__time" id="bmcRadioTime">0:00 / 0:00</div>
          <label class="bmc-radio-mini__vol">Vol <input id="bmcRadioVolume" type="range" min="0" max="1" step="0.01" value="0.18"></label>
          <audio id="bmcRadioAudio" preload="auto" autoplay></audio>
        </section>
      </section>
    </div>
  </main>

  <script type="application/json" id="shows-data">{"shows":[]}</script>
  <script src="./site-nav.js?v=20260615-homepage-header" defer></script>
  <script src="./script.js?v=20260616-t-marie-photo" defer></script>
  <script src="./bmc-radio-player.js?v=20260616-playmusic-starts-radio" defer></script>
  <script src="./puzzle-background.js?v=20260614-full-collage-cart" defer></script>
</body>
</html>
